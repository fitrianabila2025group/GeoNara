<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="15" fill="#0a0e1a" stroke="#06b6d4" stroke-width="1.5"/>
  <!-- Inner glow -->
  <circle cx="16" cy="16" r="6" fill="#06b6d4" fill-opacity="0.25"/>
  <!-- Equatorial ellipse -->
  <ellipse cx="16" cy="16" rx="11" ry="6" fill="none" stroke="#06b6d4" stroke-opacity="0.5" stroke-width="0.8"/>
  <!-- Meridian ellipse -->
  <ellipse cx="16" cy="16" rx="6" ry="11" fill="none" stroke="#06b6d4" stroke-opacity="0.5" stroke-width="0.8"/>
  <!-- Crosshair vertical -->
  <line x1="16" y1="2" x2="16" y2="30" stroke="#06b6d4" stroke-width="1.2" stroke-opacity="0.8"/>
  <!-- Crosshair horizontal -->
  <line x1="2" y1="16" x2="30" y2="16" stroke="#06b6d4" stroke-width="1.2" stroke-opacity="0.8"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#06b6d4"/>
</svg>
